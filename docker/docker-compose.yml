version: '3.8'

services:
  llm-tradebot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: llm-tradebot
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Deployment mode
      - DEPLOYMENT_MODE=docker
      # Binance API
      - BINANCE_API_KEY=${BINANCE_API_KEY:-}
      - BINANCE_SECRET_KEY=${BINANCE_SECRET_KEY:-}
      - BINANCE_TESTNET=${BINANCE_TESTNET:-true}
      # Trading config
      - TRADING_SYMBOLS=${TRADING_SYMBOLS:-BTCUSDT,ETHUSDT,SOLUSDT}
      # LLM Provider (default: minimax)
      - LLM_PROVIDER=${LLM_PROVIDER:-minimax}
      # LLM API Keys
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY:-}
      - QWEN_API_KEY=${QWEN_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - KIMI_API_KEY=${KIMI_API_KEY:-}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-}
      - GLM_API_KEY=${GLM_API_KEY:-}
      # Quant API
      - QUANT_AUTH_TOKEN=${QUANT_AUTH_TOKEN:-}
      # Database (optional)
      - DATABASE_URL=${DATABASE_URL:-}
      # Redis (optional)
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      # Web password
      - WEB_PASSWORD=${WEB_PASSWORD:-admin123}
    volumes:
      # Persist data
      - ../data:/app/data
      - ../logs:/app/logs
      - ../models:/app/models
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - tradebot-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/info"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: llm-tradebot-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - tradebot-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  tradebot-network:
    driver: bridge

volumes:
  redis_data:
